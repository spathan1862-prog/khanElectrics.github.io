<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Wishlist | Khan Services</title>
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="View your saved products in your wishlist.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- ─── Header ─── -->
    <header class="header" id="header">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i data-lucide="zap"></i></div>
                <span> Khan Services</span>
            </a>

            <nav class="nav-links" id="nav-links">
                <a href="index.html#home">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#products">Products</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact</a>
                <a href="orders.html">My Orders</a>
            </nav>

            <div class="nav-actions">
                <a href="wishlist.html" class="nav-icon-btn" aria-label="Wishlist">
                    <i data-lucide="heart"></i>
                    <span class="nav-badge" id="nav-wishlist-count" style="display: none;">0</span>
                </a>
                <a href="cart.html" class="nav-icon-btn" aria-label="Cart">
                    <i data-lucide="shopping-cart"></i>
                    <span class="nav-badge" id="nav-cart-count" style="display: none;">0</span>
                </a>
                <!-- Auth button injected by auth.js -->
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
                <div class="hamburger" id="hamburger">
                    <i data-lucide="menu"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Nav Overlay -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title fade-up">My Wishlist</h1>
                <p class="page-subtitle fade-up">Items you've saved for later.</p>
            </div>
        </section>

        <section class="section" style="padding-top: 0;">
            <div class="container">
                <div id="wishlist-content-area">
                    <div style="text-align:center;padding:60px;color:var(--text-muted);">
                        <i data-lucide="loader" style="width:32px;height:32px;animation:spin 1s linear infinite;"></i>
                        <p>Loading your wishlist...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
        <div class="container">
            <p>&copy; <span id="year"></span> Khan Electrical Services. All rights reserved.</p>
        </div>
    </footer>

    <!-- ─── Scripts ─── -->
    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>

    <!-- Firebase ES Modules -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        // ── Init ──────────────────────────────────────────────────────────────
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Theme ─────────────────────────────────────────────────────────────
        const currentTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        const themeIconEl = document.getElementById('theme-icon');
        if (themeIconEl) themeIconEl.setAttribute('data-lucide', currentTheme === 'dark' ? 'sun' : 'moon');
        lucide.createIcons();

        document.getElementById('theme-toggle').addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('theme-icon').setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        });

        // ── Mobile Menu ───────────────────────────────────────────────────────
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        const navOverlay = document.getElementById('nav-overlay');
        function openNav()  { navLinks && navLinks.classList.add('active');    navOverlay && navOverlay.classList.add('active'); }
        function closeNav() { navLinks && navLinks.classList.remove('active'); navOverlay && navOverlay.classList.remove('active'); }
        if (hamburger) hamburger.addEventListener('click', () => navLinks.classList.contains('active') ? closeNav() : openNav());
        if (navOverlay) navOverlay.addEventListener('click', closeNav);
        document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', closeNav));

        // ── Navbar Scroll ─────────────────────────────────────────────────────
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        // ── Badge Listeners ───────────────────────────────────────────────────
        window.addEventListener('cart-updated', (e) => {
            const badge = document.getElementById('nav-cart-count');
            if (badge) {
                badge.textContent = e.detail.count;
                badge.style.display = e.detail.count > 0 ? 'flex' : 'none';
            }
        });

        window.addEventListener('wishlist-updated', (e) => {
            const badge = document.getElementById('nav-wishlist-count');
            if (badge) {
                badge.textContent = e.detail.count;
                badge.style.display = e.detail.count > 0 ? 'flex' : 'none';
            }
            renderWishlist(); // Re-render when wishlist changes
        });

        // ── Auth State: resolve loading spinner regardless of login state ────
        window.addEventListener('auth-state-changed', () => {
            // Always call renderWishlist after auth resolves (logged in or not).
            // This clears the "Loading your wishlist..." spinner.
            setTimeout(renderWishlist, 200);
        });

        // Fallback: if auth never fires within 5s, render anyway
        setTimeout(() => {
            const area = document.getElementById('wishlist-content-area');
            if (area && area.querySelector('p') && area.querySelector('p').textContent.includes('Loading')) {
                renderWishlist();
            }
        }, 5000);

        // ── Render Wishlist ───────────────────────────────────────────────────
        function renderWishlist() {
            if (!window.WishlistManager) {
                setTimeout(renderWishlist, 100);
                return;
            }

            const wishlistArea = document.getElementById('wishlist-content-area');
            const items = window.WishlistManager.getWishlist();

            if (items.length === 0) {
                wishlistArea.innerHTML = `
                    <div class="empty-state fade-up">
                        <i data-lucide="heart"></i>
                        <h3>Your wishlist is empty</h3>
                        <p>Explore our products and tap the heart icon to save items you love.</p>
                        <a href="index.html#products" class="btn-primary">Browse Products</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            let html = '<div class="section-grid">';
            items.forEach(product => {
                const safeName = product.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                html += `
                    <div class="card fade-up">
                        <div class="card-img">
                            <img src="${product.image || ''}" alt="${product.name}" loading="lazy" onerror="this.style.display='none'">
                        </div>
                        <div class="card-body">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                                <div class="card-category">${product.category || 'Product'}</div>
                                <button onclick="window.WishlistManager.removeFromWishlist('${safeName}')"
                                    style="background:none;border:none;cursor:pointer;color:#ef4444;" aria-label="Remove from Wishlist">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </div>
                            <h3 class="card-name">${product.name}</h3>
                            <p class="card-text">${product.description || product.details || ''}</p>
                            <div class="card-footer">
                                <div class="card-price">₹${Number(product.price || 0).toFixed(2)}</div>
                                <button onclick="window.WishlistManager.moveToCart('${safeName}')"
                                    class="btn-outline" style="padding:8px 16px;cursor:pointer;">
                                    <i data-lucide="shopping-cart"></i> Move to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            wishlistArea.innerHTML = html;
            lucide.createIcons();
        }

        // Initial render
        renderWishlist();
    </script>
</body>

</html>
