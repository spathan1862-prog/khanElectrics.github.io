<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Khan Services</title>
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="View and manage items in your shopping cart.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- ─── Header ─── -->
    <header class="header" id="header">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i data-lucide="zap"></i></div>
                <span>Khan Services</span>
            </a>

            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#products">Products</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact</a>
                <a href="orders.html">My Orders</a>
            </nav>

            <div class="nav-actions">
                <a href="wishlist.html" class="nav-icon-btn" aria-label="Wishlist">
                    <i data-lucide="heart"></i>
                    <span class="nav-badge" id="nav-wishlist-count" style="display:none;">0</span>
                </a>
                <a href="cart.html" class="nav-icon-btn" aria-label="Cart">
                    <i data-lucide="shopping-cart"></i>
                    <span class="nav-badge" id="nav-cart-count" style="display:none;">0</span>
                </a>
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
                <div class="hamburger" id="hamburger">
                    <i data-lucide="menu"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Nav Overlay (FIX BUG-06) -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">Shopping Cart</h1>
                <p class="page-subtitle">Review your selected items before checkout.</p>
            </div>
        </section>

        <section class="section" style="padding-top: 0;">
            <div class="container">
                <div id="cart-content-area">
                    <div style="text-align:center;padding:60px;color:var(--text-muted);">
                        <p>Loading your cart...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
        <div class="container">
            <p>&copy; <span id="year"></span> Khan Electrical Services. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        // ── Init ──────────────────────────────────────────────────────────────
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        // ── Theme ─────────────────────────────────────────────────────────────
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();

            document.getElementById('theme-toggle').addEventListener('click', () => {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.getElementById('theme-icon').setAttribute('data-lucide', next === 'dark' ? 'sun' : 'moon');
                lucide.createIcons();
            });
        })();

        // ── Mobile Menu (FIX BUG-06) ─────────────────────────────────────────
        const hamburger = document.getElementById('hamburger');
        const navLinks  = document.getElementById('nav-links');
        const navOverlay = document.getElementById('nav-overlay');

        function openNav()  { navLinks.classList.add('active');    navOverlay.classList.add('active'); }
        function closeNav() { navLinks.classList.remove('active'); navOverlay.classList.remove('active'); }

        if (hamburger) hamburger.addEventListener('click', () => navLinks.classList.contains('active') ? closeNav() : openNav());
        if (navOverlay) navOverlay.addEventListener('click', closeNav);
        document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', closeNav));

        // ── Navbar Scroll ─────────────────────────────────────────────────────
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        // ── Badge Listeners ───────────────────────────────────────────────────
        window.addEventListener('cart-updated', (e) => {
            const badge = document.getElementById('nav-cart-count');
            if (badge) { badge.textContent = e.detail.count; badge.style.display = e.detail.count > 0 ? 'flex' : 'none'; }
            renderCart();
        });

        window.addEventListener('wishlist-updated', (e) => {
            const badge = document.getElementById('nav-wishlist-count');
            if (badge) { badge.textContent = e.detail.count; badge.style.display = e.detail.count > 0 ? 'flex' : 'none'; }
        });

        // ── Cart Render (FIX BUG-01 + BUG-02) ────────────────────────────────
        // FIX BUG-02: All onclick uses data attributes — NO inline product names.
        // FIX BUG-01: renderCart() called directly, not via event.
        let renderScheduled = false;

        function renderCart() {
            if (!window.CartManager) { setTimeout(renderCart, 100); return; }
            if (renderScheduled) return;
            renderScheduled = true;
            requestAnimationFrame(() => {
                renderScheduled = false;
                _doRenderCart();
            });
        }

        function _doRenderCart() {
            const cartArea = document.getElementById('cart-content-area');
            if (!cartArea) return;

            const cartItems = window.CartManager.getCart();

            if (cartItems.length === 0) {
                cartArea.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="shopping-bag" style="width:64px;height:64px;color:var(--text-muted);margin-bottom:24px;opacity:0.5;"></i>
                        <h3>Your cart is empty</h3>
                        <p>Looks like you haven't added anything to your cart yet.</p>
                        <a href="index.html#products" class="btn-primary" style="margin-top:8px;">Continue Shopping</a>
                    </div>`;
                lucide.createIcons();
                return;
            }

            const subtotal = window.CartManager.getCartTotal();
            const tax      = 18;
            const shipping = 49;
            const total    = subtotal + tax + shipping;

            // FIX BUG-02: Build items using data-index attribute — no inline name escaping
            let itemsHtml = '';
            cartItems.forEach((item, idx) => {
                const price = typeof item.price === 'number' ? item.price : parseFloat(String(item.price).replace(/[^0-9.-]+/g, '')) || 0;
                itemsHtml += `
                    <div class="cart-item">
                        <img src="${item.image || ''}" alt="${item.name}" class="cart-item-img" onerror="this.style.display='none'">
                        <div class="cart-item-details">
                            <div class="cart-item-category">${item.category || 'Product'}</div>
                            <h4>${item.name}</h4>
                            <div class="cart-item-price">₹${price.toFixed(2)}</div>
                        </div>
                        <div class="cart-item-actions">
                            <div class="qty-controls">
                                <button class="qty-btn" data-action="decrease" data-index="${idx}">
                                    <i data-lucide="minus" style="width:16px;height:16px;"></i>
                                </button>
                                <span style="min-width:24px;text-align:center;font-weight:600;">${item.quantity}</span>
                                <button class="qty-btn" data-action="increase" data-index="${idx}">
                                    <i data-lucide="plus" style="width:16px;height:16px;"></i>
                                </button>
                            </div>
                            <button class="cart-item-remove" data-action="remove" data-index="${idx}" title="Remove item">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                    </div>`;
            });

            cartArea.innerHTML = `
                <div class="cart-container">
                    <div class="cart-items" id="cart-items-list">${itemsHtml}</div>
                    <div>
                        <div class="cart-summary">
                            <h3 style="margin-bottom:24px;font-size:1.25rem;">Order Summary</h3>
                            <div class="summary-row"><span>Subtotal</span><span>₹${subtotal.toFixed(2)}</span></div>
                            <div class="summary-row"><span>Tax</span><span>₹${tax.toFixed(2)}</span></div>
                            <div class="summary-row"><span>Delivery Charge</span><span>₹${shipping.toFixed(2)}</span></div>
                            <div class="summary-row total"><span>Total</span><span>₹${total.toFixed(2)}</span></div>
                            <a href="https://razorpay.me/@Luminosoft" class="btn-primary btn-full">
                                Proceed to Checkout <i data-lucide="arrow-right"></i>
                            </a>
                            <div style="text-align:center;margin-top:16px;">
                                <a href="index.html#products" style="color:var(--primary);font-size:0.9rem;font-weight:500;">or Continue Shopping</a>
                            </div>
                        </div>
                    </div>
                </div>`;

            lucide.createIcons();

            // FIX BUG-02: Event delegation using data-index (safe, no string escaping)
            const itemsList = document.getElementById('cart-items-list');
            if (itemsList) {
                itemsList.addEventListener('click', function(e) {
                    const btn = e.target.closest('[data-action]');
                    if (!btn) return;
                    const action = btn.getAttribute('data-action');
                    const idx    = parseInt(btn.getAttribute('data-index'));
                    const items  = window.CartManager.getCart();
                    if (!items[idx]) return;
                    const name = items[idx].name;

                    if (action === 'remove')   window.CartManager.removeFromCart(name);
                    if (action === 'increase') window.CartManager.updateQuantity(name, items[idx].quantity + 1);
                    if (action === 'decrease') window.CartManager.updateQuantity(name, items[idx].quantity - 1);
                });
            }
        }

        // Initial render
        renderCart();

        // Re-render cart when auth resolves and Firestore data is loaded
        window.addEventListener('auth-state-changed', () => {
            // After auth change, Firestore cart sync may update local cart.
            // Give it a brief moment to sync then re-render.
            setTimeout(renderCart, 800);
        });
    </script>
</body>
</html>
