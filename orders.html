<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Khan Services</title>
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="Track and view your past orders at Khan Services.">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- ─── Header ─── -->
    <header class="header" id="header">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i data-lucide="zap"></i></div>
                <span>Khan Services</span>
            </a>

            <nav class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#products">Products</a>
                <a href="index.html#projects">Projects</a>
                <a href="index.html#about">About Us</a>
                <a href="index.html#contact">Contact</a>
                <a href="orders.html" class="active">My Orders</a>
            </nav>

            <div class="nav-actions">
                <a href="wishlist.html" class="nav-icon-btn" aria-label="Wishlist">
                    <i data-lucide="heart"></i>
                    <span class="nav-badge" id="nav-wishlist-count" style="display:none;">0</span>
                </a>
                <a href="cart.html" class="nav-icon-btn" aria-label="Cart">
                    <i data-lucide="shopping-cart"></i>
                    <span class="nav-badge" id="nav-cart-count" style="display:none;">0</span>
                </a>
                <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                    <i data-lucide="moon" id="theme-icon"></i>
                </button>
                <div class="hamburger" id="hamburger">
                    <i data-lucide="menu"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Nav Overlay -->
    <div class="nav-overlay" id="nav-overlay"></div>

    <main>
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">My Orders</h1>
                <p class="page-subtitle">Track and view your past orders.</p>
            </div>
        </section>

        <section class="section" style="padding-top: 0;">
            <div class="container">

                <!-- Not logged in -->
                <div id="orders-login-prompt" style="display:none; text-align:center; padding:60px 20px;">
                    <div style="max-width:480px; margin:0 auto;">
                        <i data-lucide="lock" style="width:64px;height:64px;color:var(--text-muted);margin-bottom:24px;opacity:0.4;"></i>
                        <h3 style="margin-bottom:12px;">Login Required</h3>
                        <p style="color:var(--text-muted);margin-bottom:24px;">Please log in to view your order history.</p>
                        <a href="index.html" class="btn-primary">
                            <i data-lucide="log-in"></i> Go to Home & Login
                        </a>
                    </div>
                </div>

                <!-- Loading -->
                <div id="orders-loading" style="text-align:center; padding:60px; color:var(--text-muted);">
                    <i data-lucide="loader" style="width:36px;height:36px;margin-bottom:16px;animation:spin 1s linear infinite;"></i>
                    <p>Loading your orders...</p>
                </div>

                <!-- Orders -->
                <div id="orders-list-container" style="display:none;">
                    <div class="orders-list" id="orders-list"></div>
                </div>

            </div>
        </section>
    </main>

    <footer style="padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
        <div class="container">
            <p>&copy; <span id="year"></span> Khan Electrical Services. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script>
        lucide.createIcons();
        document.getElementById('year').textContent = new Date().getFullYear();

        // Theme
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
            document.getElementById('theme-toggle').addEventListener('click', () => {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                document.getElementById('theme-icon').setAttribute('data-lucide', next === 'dark' ? 'sun' : 'moon');
                lucide.createIcons();
            });
        })();

        // Mobile Menu
        const hamburger  = document.getElementById('hamburger');
        const navLinks   = document.getElementById('nav-links');
        const navOverlay = document.getElementById('nav-overlay');
        function openNav()  { navLinks.classList.add('active');    navOverlay.classList.add('active'); }
        function closeNav() { navLinks.classList.remove('active'); navOverlay.classList.remove('active'); }
        if (hamburger)  hamburger.addEventListener('click',  () => navLinks.classList.contains('active') ? closeNav() : openNav());
        if (navOverlay) navOverlay.addEventListener('click', closeNav);
        document.querySelectorAll('.nav-links a').forEach(a => a.addEventListener('click', closeNav));

        // Navbar scroll
        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        // Nav badges
        window.addEventListener('cart-updated', (e) => {
            const b = document.getElementById('nav-cart-count');
            if (b) { b.textContent = e.detail.count; b.style.display = e.detail.count > 0 ? 'flex' : 'none'; }
        });
        window.addEventListener('wishlist-updated', (e) => {
            const b = document.getElementById('nav-wishlist-count');
            if (b) { b.textContent = e.detail.count; b.style.display = e.detail.count > 0 ? 'flex' : 'none'; }
        });

        // ── Orders Logic (FIX BUG-10: cleaner auth state handling) ──────────────
        let ordersState = 'waiting'; // 'waiting' | 'loading' | 'loaded' | 'no-auth'

        function showLoading()    { document.getElementById('orders-loading').style.display = 'block';   document.getElementById('orders-login-prompt').style.display = 'none'; document.getElementById('orders-list-container').style.display = 'none'; }
        function showLoginPrompt(){ document.getElementById('orders-loading').style.display = 'none';    document.getElementById('orders-login-prompt').style.display = 'block'; document.getElementById('orders-list-container').style.display = 'none'; lucide.createIcons(); }
        function showOrdersList() { document.getElementById('orders-loading').style.display = 'none';    document.getElementById('orders-login-prompt').style.display = 'none'; document.getElementById('orders-list-container').style.display = 'block'; }

        // Auth state change listener (fires when auth module loads)
        window.addEventListener('auth-state-changed', async (e) => {
            if (ordersState === 'loaded') return; // Already loaded
            const user = e.detail.user;
            if (!user) {
                ordersState = 'no-auth';
                showLoginPrompt();
                return;
            }
            ordersState = 'loading';
            showLoading();
            await loadOrders(user.uid);
        });

        // FIX BUG-10: Timeout fallback — show appropriate state after 6 seconds
        // But check _currentUser first in case auth already resolved
        setTimeout(() => {
            if (ordersState === 'waiting') {
                // Auth module hasn't fired yet — check window._currentUser
                if (window._currentUser) {
                    ordersState = 'loading';
                    loadOrders(window._currentUser.uid);
                } else {
                    ordersState = 'no-auth';
                    showLoginPrompt();
                }
            }
        }, 4000);

        async function loadOrders(userId) {
            try {
                const { collection, query, where, orderBy, getDocs } =
                    await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");

                // Wait for db
                let db = window._firebaseDb;
                let attempts = 0;
                while (!db && attempts < 20) {
                    await new Promise(r => setTimeout(r, 300));
                    db = window._firebaseDb;
                    attempts++;
                }

                if (!db) throw new Error('Firestore not initialized.');

                let snapshot;
                try {
                    const q = query(
                        collection(db, 'orders'),
                        where('userId', '==', userId),
                        orderBy('createdAt', 'desc')
                    );
                    snapshot = await getDocs(q);
                } catch (indexErr) {
                    // If orderBy fails (missing index), fetch without sort
                    console.warn('Orders query fallback (no index):', indexErr.message);
                    const q2 = query(collection(db, 'orders'), where('userId', '==', userId));
                    snapshot = await getDocs(q2);
                }

                ordersState = 'loaded';

                if (snapshot.empty) {
                    showOrdersList();
                    document.getElementById('orders-list').innerHTML = `
                        <div class="empty-state">
                            <i data-lucide="package" style="width:64px;height:64px;color:var(--text-muted);margin-bottom:24px;opacity:0.4;"></i>
                            <h3>No orders yet</h3>
                            <p>You haven't placed any orders yet.</p>
                            <a href="index.html#products" class="btn-primary" style="margin-top:8px;">
                                <i data-lucide="shopping-bag"></i> Shop Now
                            </a>
                        </div>`;
                    lucide.createIcons();
                    return;
                }

                const orders = [];
                snapshot.forEach(d => orders.push({ id: d.id, ...d.data() }));

                // Sort client-side if needed
                orders.sort((a, b) => {
                    const ta = a.createdAt?.toDate?.() || 0;
                    const tb = b.createdAt?.toDate?.() || 0;
                    return tb - ta;
                });

                renderOrders(orders);
                showOrdersList();

            } catch (err) {
                console.error('Error loading orders:', err);
                ordersState = 'loaded';
                document.getElementById('orders-loading').innerHTML = `
                    <div style="text-align:center;color:var(--text-muted);padding:40px;">
                        <i data-lucide="alert-circle" style="width:48px;height:48px;margin-bottom:16px;opacity:0.5;"></i>
                        <p>Unable to load orders. Please try refreshing.</p>
                        <button onclick="location.reload()" class="btn-outline" style="margin-top:16px;">Refresh Page</button>
                    </div>`;
                lucide.createIcons();
            }
        }

        function formatDate(ts) {
            if (!ts) return 'Date unavailable';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('en-IN', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');
            list.innerHTML = orders.map(order => {
                const status = (order.status || 'Pending');
                const statusClass = `status-${status.toLowerCase()}`;

                const items = order.products || order.items || [];
                const itemsHtml = items.length > 0
                    ? items.map(item => `
                        <div class="order-line-item">
                            <span>${item.name} <span style="color:var(--text-muted);font-size:0.85rem;">×${item.quantity || 1}</span></span>
                            <span style="font-weight:600;">₹${(Number(item.price || 0) * Number(item.quantity || 1)).toFixed(2)}</span>
                        </div>`).join('')
                    : '<p style="color:var(--text-muted);font-size:0.9rem;">No item details</p>';

                const addr = order.address;
                const addrText = addr
                    ? [addr.line1, addr.line2, addr.city, addr.state, addr.pincode].filter(Boolean).join(', ')
                    : 'No address recorded';

                return `
                    <div class="order-card fade-up">
                        <div class="order-card-header">
                            <div>
                                <div class="order-card-id">#${order.id.substring(0, 12).toUpperCase()}</div>
                                <div class="order-card-date">📅 ${formatDate(order.createdAt)}</div>
                            </div>
                            <span class="order-status-badge ${statusClass}">${status}</span>
                        </div>
                        <div class="order-items-list">${itemsHtml}</div>
                        <div class="order-total-row">
                            <span>Total Paid</span>
                            <span style="color:var(--primary);">₹${Number(order.totalAmount || order.total || 0).toFixed(2)}</span>
                        </div>
                        <div class="order-address">
                            📦 <strong>Delivery:</strong> ${addrText}<br>
                            💳 <strong>Payment:</strong> ${(order.paymentMethod || 'COD').toUpperCase()}
                        </div>
                    </div>`;
            }).join('');

            lucide.createIcons();

            // Animate cards
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { threshold: 0.1 });
            document.querySelectorAll('.order-card.fade-up').forEach(el => obs.observe(el));
        }
    </script>
</body>
</html>
