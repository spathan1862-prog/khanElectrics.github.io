<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khan Electrician</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="site-header">
  <div class="header-inner">
    <h2 style="color:#ffd700;">Khan Electrician</h2>

    <ul class="nav-links" id="nav">
      <li><a href="#">Home</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <button class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- ===== HERO ===== -->
<section class="hero-slider">
  <div class="slider-wrap">
    <h1 id="serviceTitle">House Wiring</h1>
    <p id="serviceDesc">Safe and reliable electrical wiring for homes.</p>

    <div style="margin-top:20px;">
      <button onclick="prevSlide()">⬅</button>
      <button onclick="nextSlide()">➡</button>
    </div>
  </div>
</section>

<!-- ===== SERVICES ===== -->
<section class="section" id="services">
  <h2 class="section-title">Our Services</h2>

  <div class="service-card">
    <i class="fa-solid fa-plug"></i>
    <h3>House Wiring</h3>
    <p>Complete home wiring solutions.</p>
  </div>
</section>

<!-- ===== CONTACT ===== -->
<section class="section contact" id="contact">
  <h2 class="section-title">Contact</h2>

  <div class="contact-item">
    <i class="fa fa-phone"></i>
    <h3>Call</h3>
    <p>+91 9999999999</p>
  </div>
</section>

<!-- ===== WHATSAPP ===== -->
<a href="https://wa.me/919999999999" target="_blank" class="wa-button">
  <i class="fab fa-whatsapp"></i>
</a>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
